name: finance_tracker
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # Isar Datenbank
  isar: ^3.1.0
  isar_flutter_libs: ^3.1.0

  # Pfade für Isar (Dokumentenverzeichnis)
  path_provider: ^2.1.3

  # Datum/Zeit/Formatierung
  intl: ^0.19.0

  # Firebase
  firebase_core: ^2.0.0
  firebase_auth: ^4.0.0
  cloud_functions: ^4.0.0

  # Google Login
  google_sign_in: ^6.0.0

  flutter_pdfview: ^1.3.1

  # WICHTIG: Upgrade auf neueste Syncfusion-Versionen (v2 embedding)
  syncfusion_flutter_pdf: ^27.1.48
  syncfusion_flutter_pdfviewer: ^27.1.48

  share_handler: ^0.0.18

  receive_sharing_intent: ^1.8.0

  google_mlkit_text_recognition: ^0.13.0

  image_picker: ^1.0.7

  sqflite: ^2.3.3
  path: ^1.9.0
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

  # Codegenerierung für Isar
  build_runner: ^2.4.11
  isar_generator: ^3.1.0
  
  shared_preferences: ^2.5.3

flutter:
  uses-material-design: true